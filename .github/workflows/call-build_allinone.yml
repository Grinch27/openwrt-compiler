name: Call Build (All in One Docker)

# Github Actions workflow syntax reference:
# https://docs.github.com/zh/actions/reference/workflows-and-actions/workflow-syntax
# https://docs.github.com/zh/actions/reference/workflows-and-actions/metadata-syntax#runs-for-composite-actions
# https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations#yaml-anchors-and-aliases

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/call-build_allinone.yml"
  schedule:
    - cron: "0 21 * * *"
      timezone: "Etc/UTC"
  repository_dispatch:
  workflow_dispatch:

# run-name: Build Matrix for OpenWrt (Docker)
run-name: >-
  Compile Docker -
  ${{ github.event_name }} -
  ${{ github.ref_name }}

permissions: write-all

defaults:
  run:
    shell: bash

env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NONINTERACTIVE_SEEN: "true"
  APT_LISTCHANGES_FRONTEND: none
  NEEDRESTART_MODE: a
  FORCE_UNSAFE_CONFIGURE: "1"
  TZ: Etc/UTC
  DISPLAY_TZ: Etc/UTC
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  # Git
  GIT_TERMINAL_PROMPT: "0"
  # Docker/BuildKit
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  runner-image:
    name: ubuntu-latest - runner-image
    runs-on: &step_image ubuntu-latest
    outputs:
      RUNNER_IMAGE: ${{ steps.resolve-runner-image.outputs.RUNNER_IMAGE }}
    steps:
      - name: Resolve runner-image
        id: resolve-runner-image
        uses: Grinch27/github-actions/.github/actions/resolve-runner-image@main

  toolchain:
    name: ${{ needs.runner-image.outputs.RUNNER_IMAGE }} - ubuntu:devel - toolchain
    needs: runner-image
    runs-on: ${{ needs.runner-image.outputs.RUNNER_IMAGE }}
    container:
      image: &container_image ubuntu:devel
      options: &container_options >-
        --privileged
        --user=0:0
        --pid=host
        --ipc=host
        --uts=host
        --cgroupns=host
        --cap-add=ALL
        --security-opt apparmor=unconfined
        --security-opt seccomp=unconfined
        --init
        --pids-limit=-1
        --shm-size=12g
        --ulimit nofile=1048576:1048576
      volumes: &container_volumes
        - /dev:/dev
        - /sys:/sys:rw
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
        - /run/udev:/run/udev:ro
        - /lib/modules:/lib/modules:ro
        - /var/run/docker.sock:/var/run/docker.sock
    outputs:
      gcc_version: ${{ steps.resolve-toolchain.outputs.gcc_version }}
      clang_version: ${{ steps.resolve-toolchain.outputs.clang_version }}
      jdk_version: ${{ steps.resolve-toolchain.outputs.jdk_version }}
      custom_env: ${{ steps.resolve-toolchain.outputs.custom_env }}
    steps:
      - name: Resolve toolchain versions
        id: resolve-toolchain
        uses: Grinch27/github-actions/.github/actions/resolve-toolchain-version@main

  heads:
    name: ${{ needs.runner-image.outputs.RUNNER_IMAGE }} - Heads - ${{ matrix.repo_target }}
    needs: runner-image
    runs-on: ${{ needs.runner-image.outputs.RUNNER_IMAGE }}
    outputs:
      repo_branch: ${{ steps.git-heads.outputs.repo_branch }}
    strategy:
      fail-fast: false
      matrix:
        repo_target: ["https://github.com/openwrt/openwrt.git"]
    steps:
      - name: Get the latest openwrt version branch
        id: git-heads
        run: |
          repo_head=$(git ls-remote --heads ${{ matrix.repo_target }} \
            | grep 'refs/heads/openwrt-[0-9]\+\.[0-9]\+$' \
            | sed 's/.*refs\/heads\/openwrt-//' \
            | sort -V \
            | tail -n1)
          echo "repo_branch=openwrt-$repo_head" | tee -a "${GITHUB_OUTPUT}"

  action:
    name: >-
      ${{ needs.runner-image.outputs.RUNNER_IMAGE }} -
      gcc-${{ needs.toolchain.outputs.gcc_version }} -
      ${{ matrix.openwrt_branch }} -
      ${{ matrix.workflows_inputs.Target_System }} -
      ${{ matrix.workflows_inputs.Subtarget }} -
      ${{ matrix.workflows_inputs.Target_Profile || matrix.workflows_inputs.Subtarget }}
    needs:
      - runner-image
      - toolchain
      - heads
    runs-on: ${{ needs.runner-image.outputs.RUNNER_IMAGE }}
    container:
      image: *container_image
      options: *container_options
      volumes: *container_volumes
    env:
      # ========= Toolchain Environment Variables ==========
      # ----- gcc -----
      gcc_purge: false
      gcc_install: false
      gcc_switch: false
      gcc_version: ""
      gcc_aarch64: false
      # ----- clang -----
      clang_purge: false
      clang_install: false
      clang_switch: false
      clang_version: ""
      # ----- jdk -----
      jdk_purge: false
      jdk_install: false
      jdk_switch: false
      jdk_version: ""
      # ----- docker -----
      docker_install: false
      qemu_install: false
      # ========= Workspace Environment Variables ==========
      # ----- Repository -----
      REPO_target: "${{ matrix.openwrt_repo }}"
      REPO_target_branch: "${{ matrix.openwrt_branch }}"
      REPO_self: "https://github.com/${{ github.repository }}"
      REPO_self_branch: "main"
      # ----- Build Path -----
      PATH_build: "/builder"
      PATH_target: "/builder/target"
      PATH_output: "/builder/output"
      PATH_backup: "/builder/backup"
      PATH_self: "/builder/self"
      MD_release: "/builder/release.md"
      # PATH_patches: "/builder/target/patches"
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        openwrt_repo: ["https://github.com/openwrt/openwrt.git"]
        openwrt_branch: ["main", "${{ needs.heads.outputs.repo_branch }}"]
        workflows_inputs:
          - {
              Target_System: "MediaTek_Ralink_ARM",
              Subtarget: "MT798x",
              Target_Profile: "",
            }
          - {
              Target_System: "MediaTek_Ralink_MIPS",
              Subtarget: "MT7621",
              Target_Profile: "",
            }
        include:
          - {
              openwrt_repo: "https://github.com/openwrt/openwrt.git",
              openwrt_branch: "main",
              workflows_inputs:
                {
                  Target_System: "MediaTek_Ralink_ARM",
                  Subtarget: "MT798x",
                  Target_Profile: "MT798x_docker",
                },
            }
          - {
              openwrt_repo: "https://github.com/openwrt/openwrt.git",
              openwrt_branch: "main",
              workflows_inputs:
                {
                  Target_System: "x86",
                  Subtarget: "x86_64",
                  Target_Profile: "",
                },
            }
          - {
              openwrt_repo: "https://github.com/hanwckf/immortalwrt-mt798x.git",
              openwrt_branch: "openwrt-21.02",
              workflows_inputs:
                {
                  Target_System: "MediaTek_Ralink_ARM",
                  Subtarget: "MT798x",
                  Target_Profile: "immortalwrt-mt798x_7981",
                },
            }
          - {
              openwrt_repo: "https://github.com/hanwckf/immortalwrt-mt798x.git",
              openwrt_branch: "openwrt-21.02",
              workflows_inputs:
                {
                  Target_System: "MediaTek_Ralink_ARM",
                  Subtarget: "MT798x",
                  Target_Profile: "immortalwrt-mt798x_7986",
                },
            }
    steps:
      # ========== Pre: Settings ==========
      - name: (Env) GCC Cross-Compiler
        id: env-gcc_cross
        run: |
          echo -e "Current working directory: $(pwd)"

          if [[ "${{ matrix.workflows_inputs.Target_System }}" == "MediaTek_Ralink_ARM" ]]; then
            echo "gcc_aarch64=true" | tee -a "${GITHUB_ENV}"
          else
            echo "gcc_aarch64=false" | tee -a "${GITHUB_ENV}"
          fi

          echo "gcc_cross: ${{ env.gcc_aarch64 }}"

      - name: (Var) environment variable setup
        id: var-setup
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          # ========== Openwrt make menuconfig ==========
          Target_System="${{ matrix.workflows_inputs.Target_System }}"
          Subtarget="${{ matrix.workflows_inputs.Subtarget }}"
          Target_Profile="${{ matrix.workflows_inputs.Target_Profile }}"
          if [[ -z "$Target_Profile" ]]; then
            Target_Profile="$Subtarget"
          fi

          # ========== Set OpenWrt repo branch (sanitize URL) ==========
          _repo_in="${{ matrix.openwrt_repo }}"
          if [[ "${_repo_in}" =~ ^https?:// ]]; then
            REPO_target="${_repo_in}"
          else
            REPO_target="https://${_repo_in}"
          fi
          REPO_self_owner="${{ github.repository_owner }}"

          # ===== Align with indocker workspace (/builder) =====
          DIR_profile="${Target_System}/${Subtarget}/${Target_Profile}"

          # DIY Files
          diy_config="${PATH_self}/${DIR_profile}/${Target_Profile}.config"
          diy_feeds="${PATH_self}/${DIR_profile}/feeds.conf.default"
          diy_p1_sh="${PATH_self}/${DIR_profile}/diy-part1.sh"
          diy_p2_sh="${PATH_self}/${DIR_profile}/diy-part2.sh"
          diy_files="${PATH_self}/${DIR_profile}/files"
          PATH_patches="${PATH_self}/${DIR_profile}/patches"

          # ========== GITHUB_ENV ==========
          env_vars=(
            "REPO_self_owner"
            "Target_System"
            "Subtarget"
            "Target_Profile"
            "diy_config"
            "diy_feeds"
            "diy_p1_sh"
            "diy_p2_sh"
            "diy_files"
            "PATH_patches"
          )
          for var in "${env_vars[@]}"; do
            echo "${var}=${!var}" | tee -a "${GITHUB_ENV}"
          done

      # ========== General Environment Setup: Start ==========
      - name: Docker Workspace All in One
        id: docker-workspace
        uses: Grinch27/github-actions/.github/actions/env-indocker@main

      # ========== General Environment Setup: End ==========
      - name: Clone Target Repository
        id: clone-target
        working-directory: ${{ env.PATH_build }}
        run: |
          echo -e "Current working directory: $(pwd)"

          rm -rf ${PATH_target}
          mkdir -p ${PATH_target}

          # Clone target repository: without --depth=1
          git clone ${REPO_target} ${PATH_target} --single-branch --branch=${REPO_target_branch} 
          echo -e "REPO_target: [ ${REPO_target} ]\nBRANCH: [ ${REPO_target_branch} ]"

          df -hT ${PWD}

      - name: Version of Target Repo
        id: git-rev
        uses: Grinch27/github-actions/.github/actions/git-rev@main
        with:
          path_target: ${{ env.PATH_target }}

      - name: Clone self
        id: clone-self
        working-directory: /
        run: |
          echo -e "Current working directory: $(pwd)"

          rm -rf ${PATH_self}
          mkdir -p ${PATH_self}

          git clone ${REPO_self} ${PATH_self} --single-branch --depth=1 --branch=${REPO_self_branch}
          echo -e "REPO_self: [ ${REPO_self} ]\nBRANCH: [ ${REPO_self_branch} ]"

          df -hT ${PWD}

      # ========== Compile: Start ==========
      - name: (feeds.conf.default) Load custom feeds
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          if [[ -e "${diy_feeds}" && ! "${diy_feeds}" -ef "${PATH_target}/feeds.conf.default" ]]; then
            echo -e "diy_feeds: ${diy_feeds}"
            cp -f ${diy_feeds} ${PATH_target}/feeds.conf.default
          fi

      - name: (DIY_P1.sh) after load feeds, before update feeds
        working-directory: ${{ env.PATH_target }}
        env:
          file_script: ${{ env.diy_p1_sh }}
        run: |
          echo -e "Current working directory: $(pwd)"
          if [[ -e "${file_script}" ]]; then
            echo -e "file_script: ${file_script}"
            chmod +x ${file_script}
            bash ${file_script}
            cat ${file_script}
          fi

      - name: Update feeds
        id: feeds-update
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          cat ./feeds.conf.default
          ./scripts/feeds update -a

      - name: (Install) feeds
        id: feeds-install
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          ./scripts/feeds install -a

      - name: (/files) Load custom files
        id: files
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"

          mkdir -p ./files/etc/config
          if [[ -e "${diy_files}" ]]; then
              cp -rf ${diy_files}/* ./files/
          fi

      - name: (.config) Load custom configuration
        id: config-custom
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"

          if [[ -e "${diy_config}" && ! "${diy_config}" -ef "${PATH_target}/.config" ]]; then
            echo -e "diy_config: ${diy_config}"
            cp -f ${diy_config} ${PATH_target}/.config
          else
            echo ".config file not found"
          fi
          # yes "" |
          set +e
          make oldconfig
          set -e
          cat ./.config

      - name: (patches) Apply patches
        id: patch
        if: ${{ 'true' == 'false' }} # disable
        env:
          PATH_patches: ${{ env.PATH_patches }}
        working-directory: ${{ env.PATH_target }}
        run: |
          printf "Current working directory: %s\n" "$(pwd)"

          if [ -d "${PATH_patches}" ]; then
            find "${PATH_patches}" -type f -name '*.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%' | patch -d './' -B --merge -p1 --forward"
          fi

      - name: (DIY_P2.sh) after install feeds, before download package
        working-directory: ${{ env.PATH_target }}
        env:
          file_script: ${{ env.diy_p2_sh }}
        run: |
          echo -e "Current working directory: $(pwd)"
          if [[ -e "${file_script}" ]]; then
            echo -e "file_script: ${file_script}"
            chmod +x ${file_script}
            bash ${file_script}
            cat ${file_script}
          fi

      - name: (.config) Update config
        id: config-update
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          echo "make oldconfig: update .config file..."
          # yes "" | 
          set +e
          make oldconfig
          set -e
          cat ./.config

      - name: Clean & Rebuild host tools
        id: make-clean
        # if: ${{ 'true' == 'false' }} # disable
        working-directory: ${{ env.PATH_target }}
        run: |
          make dirclean
          # make tools/install -j$(($(nproc) + 1))
          make tools/install -j$(($(nproc) + 1)) V=s

      - name: Download package
        id: package
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          echo -e "make download: $(($(nproc) + 1)) thread"
          make download -j$(($(nproc) + 1))
          # find dl -size -1024c -exec ls -l {} \;
          # find dl -size -1024c -exec rm -f {} \;

      - name: Test Before Compile
        id: make-test
        if: ${{ 'true' == 'false' }} # disable
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          # grep -R "kmod-sound-mt7620" target/linux/ramips/image -n

      - name: Compile the OpenWrt
        id: compile
        working-directory: ${{ env.PATH_target }}
        run: |
          echo -e "Current working directory: $(pwd)"
          echo -e "$(($(nproc) + 1)) thread compile"
          # if [ "${{ env.continue_on_error }}" == "true" ]; then
          #   make -j$(($(nproc) + 1)) V=s -k
          # else
          #   make -j$(($(nproc) + 1)) V=s
          # fi
          make -j$(($(nproc) + 1)) V=s

      - name: Copy to output
        id: output
        working-directory: /
        env:
          PATH_TARGET: ${{ env.PATH_target }}/bin/targets/*/*/*
        run: |
          echo -e "Current working directory: $(pwd)"

          [[ -e "${PATH_output}" ]] || mkdir -p ${PATH_output}

          echo "复制 ${PATH_TARGET} 到: ${PATH_output}/"
          cp -rf ${PATH_TARGET} ${PATH_output}/
          ls -lhR ${PATH_output}/

          echo "复制 ${PATH_target}/.config 到: ${PATH_output}/config"
          cp -f ${PATH_target}/.config ${PATH_output}/config

          echo -e "timestamp=$(date +"%y%mw%V")" >> "${GITHUB_OUTPUT}"

      - name: Version of the kernel
        id: version-kernel
        working-directory: ${{ env.PATH_output }}
        run: |
          echo -e "Current working directory: $(pwd)"

          # 查找 packages 目录中的 kernel 文件
          Package_Kernel=$(find packages -name 'kernel[-_]*.*pk' | head -n 1)
          echo "Kernel file: ${Package_Kernel}"

          if [ -n "$Package_Kernel" ]; then
            # 提取文件名
            Filename_Kernel=$(basename "${Package_Kernel}")
            echo "Filename: ${Filename_Kernel}"
            
            # 使用正则表达式匹配 'kernel-' 或 'kernel_' 后面的 x.y.z 版本号
            # if [[ "${Filename_Kernel}" =~ kernel[-_](\d+\.\d+\.\d+) ]]; then
            if [[ "${Filename_Kernel}" =~ kernel[-_]([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              Version_Kernel="${BASH_REMATCH[1]}"

              echo "Kernel version: ${Version_Kernel}"
              echo "version=${Version_Kernel}" | tee -a "${GITHUB_OUTPUT}"
            else
              echo "Kernel version pattern not found in filename."
            fi
          else
            echo "No kernel file found."
          fi

      - name: (Clean) output
        id: clean-output
        working-directory: ${{ env.PATH_output }}
        run: |
          echo -e "Current working directory: $(pwd)"

          # handle Dir packages
          ls -lhR ./packages
          rm -rf ./packages

      - name: "[release.md] Record release.md"
        id: record
        working-directory: ${{ env.PATH_target }}
        run: |
          printf "Current working directory: %s\n" "$(pwd)"

          MD_release_dir=$(dirname ${MD_release})
          mkdir -p ${MD_release_dir}
          : > ${MD_release}

          set +e
          record_to_markdown() {
            local title="$1"
            local content="$2"
            local code_block="${3:-}"
            local format="\n### %s\n%s\n"

            if [[ -n "${code_block}" ]]; then
              format="\n### %s\n\n<details>\n<summary>%s</summary>\n\n\`\`\`%s\n%s\n\`\`\`\n\n</details>\n"
              printf "${format}" "${title}" "${title}" "${code_block}" "${content}" | tee -a ${MD_release}
            else
              printf "${format}" "${title}" "${content}" | tee -a ${MD_release}
            fi
          }

          # 记录Clone源码的分支和构建者、编译完成时间
          # record_to_markdown "Build ${Target_Profile} - by ${REPO_self_owner}" ""
          # record_to_markdown "OpenWrt branch" "- [${openwrt_branch};${REPO_target_branch}](${REPO_target}/tree/${REPO_target_branch})"
          record_to_markdown "Target" "- [x] ${Target_System} - ${Subtarget} - ${Target_Profile}"
          record_to_markdown "Timestamp" "- [x] $(date +"%Y-%m-%d %H:%M:%S %z")"
          record_to_markdown "Repository" "- [x] ${REPO_target}"
          record_to_markdown "Repository Branch" "- [x] ${REPO_target_branch}"

          declare -A file_records=(
            ["${diy_feeds}"]="feeds setting|bash"
            ["${diy_p1_sh}"]="$(basename "${diy_p1_sh}")|bash"
            ["${diy_p2_sh}"]="$(basename "${diy_p2_sh}")|bash"
            ["${diy_config}"]="pre-config|makefile"
            ["${{ env.PATH_target }}/.config"]=".config|makefile"
          )
          for file_path in "${!file_records[@]}"; do
            if [[ -f $file_path ]]; then
              IFS='|' read -r section_title file_type <<< "${file_records[$file_path]}"
              # 合并grep命令，一次性移除注释和空行
              code_content=$(grep -E '^[^#]' "$file_path" | grep -Ev '^\s*$' | sed 's/\s\+$//g')
              record_to_markdown "$section_title" "$code_content" "$file_type"
            fi
          done

          # # 读取profiles.json
          # profiles_json_path="${{ env.PATH_output }}/profiles.json"
          # profiles_json_content=$(jq '.' "$profiles_json_path")
          # # record_to_markdown "Profiles" "$profiles_json_content" "json"

          cat ${MD_release}
          set -e

      - name: Upload OpenWrt to Release
        id: release
        uses: ncipollo/release-action@main
        env:
          timestamp: ${{ steps.output.outputs.timestamp }}
          version_kernel: ${{ steps.version-kernel.outputs.version }}
        with:
          name: "${{ matrix.openwrt_branch }}+${{ env.version_kernel }}+${{ env.Target_System }}+${{ env.Subtarget }}+${{ env.Target_Profile }}"
          tag: "${{ matrix.openwrt_branch }}+${{ env.version_kernel }}+${{ env.Target_Profile }}"
          artifacts: "${{ env.PATH_output }}/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: "${{ secrets.GITHUB_TOKEN }}"
          bodyFile: "${{ env.MD_release }}"
